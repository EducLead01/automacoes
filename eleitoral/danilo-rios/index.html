<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Danilo Rios | Estratégia de Mídia Eleitoral 2026</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { font-family: 'Inter', sans-serif; }
    body { background: #0A0A0A; color: #fff; }

    @media print {
      * {
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
        color-adjust: exact !important;
      }
      #gate { display: none !important; }
      #page-content { display: block !important; }
      section { break-inside: avoid; }
    }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #0A0A0A; }
    ::-webkit-scrollbar-thumb { background: #E79E14; border-radius: 2px; }

    .el-yellow { color: #E79E14; }
    .bg-el-yellow { background: #E79E14; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-up { animation: fadeUp 0.6s ease both; }
    .delay-1 { animation-delay: 0.1s; }
    .delay-2 { animation-delay: 0.2s; }
    .delay-3 { animation-delay: 0.3s; }
    .delay-4 { animation-delay: 0.4s; }

    .unit-card {
      background: #111111;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 24px;
      transition: border-color 0.3s, transform 0.3s, box-shadow 0.3s;
    }
    .unit-card:hover {
      border-color: rgba(231,158,20,0.4);
      transform: translateY(-4px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
    }

    .btn-cta {
      background: #E79E14;
      color: #0A0A0A;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      border-radius: 10px;
      padding: 16px 32px;
      display: inline-block;
      text-align: center;
      transition: background 0.2s, transform 0.1s;
    }
    .btn-cta:hover {
      background: #fbbf24;
      transform: scale(1.02);
    }
    .btn-cta:active { transform: scale(0.98); }

    .number-badge {
      width: 36px;
      height: 36px;
      background: rgba(231,158,20,0.12);
      border: 1px solid rgba(231,158,20,0.3);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 900;
      color: #E79E14;
      flex-shrink: 0;
    }

    #gate {
      position: fixed;
      inset: 0;
      background: #0A0A0A;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      z-index: 999;
      padding: 24px;
      text-align: center;
    }
    #gate input {
      background: #111111;
      border: 1px solid rgba(255,255,255,0.15);
      color: #fff;
      border-radius: 10px;
      padding: 14px 18px;
      font-size: 16px;
      text-align: center;
      width: 260px;
      outline: none;
    }
    #gate input:focus { border-color: rgba(231,158,20,0.5); }
    #gate p.error { color: #ef4444; font-size: 13px; height: 16px; margin: 0; }
  </style>
</head>
<body>

  <div id="gate">
    <p class="text-xs font-black uppercase tracking-[0.35em] el-yellow">Acesso Restrito</p>
    <h1 class="font-black uppercase tracking-tight text-2xl">Proposta Danilo Rios</h1>
    <input type="password" id="gate-input" placeholder="Senha" autocomplete="off" />
    <p class="error" id="gate-error"></p>
    <button onclick="checkPassword()" class="btn-cta" style="border:none; cursor:pointer;">Entrar</button>
  </div>

  <div id="page-content" style="display:none;">
  <div data-module="sections/capa.html"></div>
  <div data-module="sections/contexto.html"></div>
  <div data-module="sections/objetivos.html"></div>
  <div data-module="sections/prestacao-contas.html"></div>
  <div data-module="sections/escopo.html"></div>
  <div data-module="sections/checklist.html"></div>
  <div data-module="sections/fase1.html"></div>
  <div data-module="sections/fase2.html"></div>
  <div data-module="sections/metodologia.html"></div>
  <div data-module="sections/indicadores.html"></div>
  <div data-module="sections/rotina.html"></div>
  <div data-module="sections/investimento.html"></div>
  <div data-module="sections/central-inteligencia.html"></div>
  <div data-module="sections/rastreamento.html"></div>
  <div data-module="sections/proximos-passos.html"></div>
  </div>

  <script>
    const PASSWORD = 'depdanilorios';

    function loadModules() {
      document.querySelectorAll('[data-module]').forEach(async (el) => {
        const res = await fetch(el.dataset.module);
        el.outerHTML = await res.text();
      });
    }

    function unlock() {
      document.getElementById('gate').style.display = 'none';
      document.getElementById('page-content').style.display = '';
      loadModules();
    }

    function checkPassword() {
      const val = document.getElementById('gate-input').value.trim().toLowerCase();
      if (val === PASSWORD) {
        localStorage.setItem('danilo-rios-auth', '1');
        unlock();
      } else {
        document.getElementById('gate-error').textContent = 'Senha incorreta';
      }
    }

    document.getElementById('gate-input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') checkPassword();
    });

    if (localStorage.getItem('danilo-rios-auth') === '1') {
      unlock();
    }
  </script>

</body>
</html>
